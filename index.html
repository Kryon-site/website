<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kryon — Three.js Brand Demo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <canvas id="c"></canvas>
    <div id="badge">Kryon</div>
  </div>
  <script type="module">
    import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';

    const canvas = document.getElementById('c');
    const scene = new THREE.Scene();
    const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
    renderer.setPixelRatio(window.devicePixelRatio);

    const fov = 45;
    const aspect = 2;  // the canvas default
    const near = 0.1;
    const far = 100;
    const camera = new THREE.PerspectiveCamera(fov, aspect, near, far);
    camera.position.set(0,0,6);

    // Brand colors
    const BRAND = {
      primary: getComputedStyle(document.documentElement).getPropertyValue('--brand-primary').trim() || '#00aaff',
      accent: getComputedStyle(document.documentElement).getPropertyValue('--brand-accent').trim() || '#ff5f6d'
    };

    // Rotating logo mesh (torus knot)
    const geometry = new THREE.TorusKnotGeometry(1.1, 0.35, 200, 32);
    const material = new THREE.MeshStandardMaterial({color: BRAND.primary, metalness:0.4, roughness:0.2, emissive: BRAND.accent});
    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    // Lights
    const hemi = new THREE.HemisphereLight('#ffffff', '#444444', 0.3);
    scene.add(hemi);
    const point = new THREE.PointLight(BRAND.accent, 1.2);
    point.position.set(5,5,5);
    scene.add(point);

    function resizeRendererToDisplaySize(renderer) {
      const canvas = renderer.domElement;
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;
      const needResize = canvas.width !== width || canvas.height !== height;
      if (needResize) {
        renderer.setSize(width, height, false);
      }
      return needResize;
    }

    function render(time) {
      time *= 0.001;
      if (resizeRendererToDisplaySize(renderer)) {
        const canvas = renderer.domElement;
        camera.aspect = canvas.clientWidth / canvas.clientHeight;
        camera.updateProjectionMatrix();
      }

      mesh.rotation.x = time * 0.4;
      mesh.rotation.y = time * 0.7;

      renderer.render(scene, camera);
      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);

    // Fill the viewport
    function fitCanvas() {
      const el = document.getElementById('app');
      canvas.width = el.clientWidth * devicePixelRatio;
      canvas.height = el.clientHeight * devicePixelRatio;
      renderer.setSize(el.clientWidth, el.clientHeight, false);
    }
    window.addEventListener('resize', fitCanvas);
    fitCanvas();
  </script>
</body>
</html>
